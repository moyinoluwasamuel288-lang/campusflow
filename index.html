<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFlow</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div class="container">
    <h1>CampusFlow</h1>

    <!-- NOTES -->
    <section>
      <h2>Notes</h2>
      <textarea id="notes" placeholder="Write your notes..."></textarea>

      <select id="fontSelect">
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier</option>
        <option value="Georgia">Georgia</option>
      </select>
    </section>

    <!-- CGPA -->
    <section>
      <h2>CGPA Calculator</h2>
      <div id="course-list"></div>
      <button onclick="addCourse()">Add Course</button>
      <button onclick="calculateCGPA()">Calculate</button>
      <p id="result"></p>
    </section>

    <!-- COUNTDOWN -->
    <section>
      <h2>Countdown</h2>
      <input type="datetime-local" id="examDate">
      <button onclick="setCountdown()">Start</button>
      <p id="countdown"></p>
    </section>

    <!-- AI -->
    <section>
      <h2>AI Assistant</h2>
      <input id="aiInput" placeholder="Ask anything...">
      <button onclick="runAI()">Ask</button>
      <p id="aiOutput"></p>
    </section>

    <!-- FOCUS -->
    <section>
      <h2>Focus</h2>
      <button onclick="startTimer(25)">Start 25 Min</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
